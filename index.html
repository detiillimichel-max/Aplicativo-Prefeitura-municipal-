<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIO GOV - Oficial</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* --- CSS INTEGRADO --- */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: system-ui, Arial;
  background:#0f172a;
  color:#e2e8f0;
  overflow: hidden;
}

.app {
  display:grid;
  grid-template-columns:70px 250px 1fr;
  height:100vh;
}

/* SIDEBAR ÍCONES */
.sidebar-icons {
  background:#020617;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:10px;
  border-right: 1px solid #1e293b;
}

.icon {
  padding:14px;
  margin:6px 0;
  border-radius:10px;
  cursor:pointer;
  opacity:0.7;
  font-size: 20px;
}

.icon:hover, .icon.active { background:#1e293b; opacity:1; }

/* SECRETARIAS */
.sidebar-channels {
  background:#020617;
  padding:10px;
  border-right:1px solid #1e293b;
  overflow-y:auto;
}

.channel {
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  color:#cbd5f5;
  margin-bottom: 4px;
}

.channel:hover { background:#1e293b; }
.channel.active { background:#2563eb; color:#fff; }

/* MAIN */
.main { display:flex; flex-direction:column; background: #0f172a; height: 100vh; }
.tela { display: none; flex-direction: column; height: 100%; }
.tela.active { display: flex; }

/* HEADER */
.chat-header {
  padding:15px;
  border-bottom:1px solid #1e293b;
  font-weight:600;
  background: #0f172a;
}

/* CHAT BOX */
.chat-box, #feed-scroll {
  flex:1;
  padding:15px;
  overflow-y:auto;
}

/* MSG */
.msg {
  max-width:70%;
  padding:10px 14px;
  margin-bottom:10px;
  border-radius:12px;
  background:#1e293b;
}

.msg.user { background:#2563eb; margin-left:auto; }

/* INPUT AREA */
.input-area {
  display:flex;
  padding:15px;
  border-top:1px solid #1e293b;
  background: #0f172a;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#020617;
  color:white;
  outline: none;
}

button {
  margin-left:10px;
  padding:10px 16px;
  background:#2563eb;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-weight: bold;
}

/* FEED POSTS */
.post {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.post img { width:100%; border-radius:10px; margin: 10px 0; }
.actions { display:flex; gap:10px; margin:10px 0; }
.comment { font-size:13px; color:#94a3b8; margin-top:5px; padding-left: 10px; border-left: 2px solid #2563eb; }

.video-card { background:#020617; padding:10px; border-radius:10px; margin-bottom:10px; }
</style>
</head>
<body>

<div class="app">
  <!-- ICONES LATERAIS -->
  <div class="sidebar-icons">
    <div class="icon active" onclick="trocarTela('chat', this)">🏛️</div>
    <div class="icon" onclick="trocarTela('feed', this)">📰</div>
  </div>

  <!-- CANAIS / SECRETARIAS -->
  <div class="sidebar-channels" id="lista"></div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="main">
    
    <!-- TELA DE CHAT -->
    <div id="tela-chat" class="tela active">
        <div class="chat-header" id="titulo">Selecione uma secretaria</div>
        <div class="chat-box" id="chat"></div>
        <div class="input-area" id="area-msg" style="display:none">
          <input id="msgInput" placeholder="Mensagem institucional...">
          <button onclick="enviarChat()">Enviar</button>
        </div>
    </div>

    <!-- TELA DE FEED -->
    <div id="tela-feed" class="tela">
        <div class="chat-header">Feed da Prefeitura</div>
        <div id="feed-scroll">
            <div class="post" style="background: #020617;">
                <input id="postText" placeholder="O que deseja comunicar?" style="width:100%; margin-bottom:10px">
                <button onclick="postar()" style="margin:0; width:100%">Publicar Comunicado</button>
            </div>
            <div id="feed-lista"></div>
        </div>
    </div>

  </div>
</div>

<script>
// --- CONFIGURAÇÃO SUPABASE ATUALIZADA (PROJETO OIO-PREFEITURA) ---
const SUPABASE_URL = 'https://svqocghixhrpqaxucubn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_lE2ZPtlhTh6OWr3S9Fb3rg_rLXHjkHH';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const secretarias = [
  "Saneamento","Finanças","Obras","Saúde","Educação",
  "Esportes","Infraestrutura","Marketing","Segurança",
  "Lazer e Cultura","RH","Gabinete","Recursos Humanos",
  "Ação Social","Compras"
];

let secretariaAtual = null;
let meuNome = "Colaborador " + Math.floor(Math.random() * 1000);

// --- NAVEGAÇÃO ---
function trocarTela(tela, el) {
    document.querySelectorAll('.tela').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.icon').forEach(i => i.classList.remove('active'));
    document.getElementById('tela-' + tela).classList.add('active');
    el.classList.add('active');
    if(tela === 'feed') carregarFeed();
}

// --- LÓGICA DO CHAT ---
const listaDiv = document.getElementById("lista");
secretarias.forEach(sec => {
    const div = document.createElement("div");
    div.className = "channel";
    div.innerText = sec;
    div.onclick = () => abrirSecretaria(sec, div);
    listaDiv.appendChild(div);
});

async function abrirSecretaria(sec, el) {
    secretariaAtual = sec;
    document.querySelectorAll(".channel").forEach(c => c.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("titulo").innerText = sec;
    document.getElementById("area-msg").style.display = "flex";
    
    // Carregar mensagens do Supabase
    const { data } = await supabase.from('mensagens').select('*').eq('secretaria', sec).order('created_at', { ascending: true });
    if(data) renderChat(data);
    
    // Escutar em tempo real
    supabase.channel('mensagens').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mensagens' }, payload => {
        if(payload.new.secretaria === secretariaAtual) carregarNovasMensagens();
    }).subscribe();
}

async function carregarNovasMensagens() {
    const { data } = await supabase.from('mensagens').select('*').eq('secretaria', secretariaAtual).order('created_at', { ascending: true });
    if(data) renderChat(data);
}

function renderChat(msgs) {
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "";
    msgs.forEach(m => {
        const classe = m.autor === meuNome ? 'msg user' : 'msg';
        chatDiv.innerHTML += `<div class="${classe}"><small style="display:block;font-size:10px;opacity:0.6">${m.autor}</small>${m.texto}</div>`;
    });
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

async function enviarChat() {
    const input = document.getElementById("msgInput");
    if(!input.value || !secretariaAtual) return;
    await supabase.from('mensagens').insert([{ secretaria: secretariaAtual, texto: input.value, autor: meuNome }]);
    input.value = "";
}

// --- LÓGICA DO FEED ---
async function postar() {
    const txt = document.getElementById("postText");
    if(!txt.value) return;
    await supabase.from('posts').insert([{ autor: meuNome, texto: txt.value }]);
    txt.value = "";
    carregarFeed();
}

async function carregarFeed() {
    const { data } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
    const lista = document.getElementById("feed-lista");
    lista.innerHTML = "";
    if(data) {
        data.forEach(p => {
            lista.innerHTML += `
                <div class="post">
                    <b>${p.autor}</b>
                    <p style="margin-top:10px">${p.texto}</p>
                    <div class="actions">
                        <button onclick="like('${p.id}')">❤️ ${p.likes ? p.likes.length : 0}</button>
                        <button onclick="comentar('${p.id}')">💬</button>
                    </div>
                    <div id="c-${p.id}"></div>
                </div>
            `;
            carregarComentarios(p.id);
        });
    }
}

async function carregarComentarios(postId) {
    const { data } = await supabase.from('comments').select('*').eq('post_id', postId);
    const div = document.getElementById("c-"+postId);
    div.innerHTML = "";
    if(data) {
        data.forEach(c => {
            div.innerHTML += `<div class="comment"><b>${c.autor}:</b> ${c.texto}</div>`;
        });
    }
}

async function comentar(postId) {
    const txt = prompt("Seu comentário:");
    if(txt) {
        await supabase.from('comments').insert([{ post_id: postId, autor: meuNome, texto: txt }]);
        carregarComentarios(postId);
    }
}

async function like(postId) {
    const { data } = await supabase.from('posts').select('likes').eq('id', postId).single();
    if(data) {
        let novosLikes = data.likes || [];
        novosLikes.push(meuNome);
        await supabase.from('posts').update({ likes: novosLikes }).eq('id', postId);
        carregarFeed();
    }
}

// Iniciar
carregarFeed();

</script>
</body>
</html>
