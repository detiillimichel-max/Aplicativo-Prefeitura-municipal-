<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIO GOV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0f172a;color:#e2e8f0}

/* LOGIN */
#login{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#020617;z-index:999;
}
.login-box{
  background:#1e293b;padding:30px;border-radius:12px;
  display:flex;flex-direction:column;gap:10px;width:250px;
}
.login-box input{padding:10px;border-radius:8px;border:none}
.login-box button{padding:10px;background:#2563eb;border:none;color:white;border-radius:8px}

/* APP */
.app{display:grid;grid-template-columns:70px 250px 1fr;height:100vh}

/* SIDEBAR */
.sidebar-icons{background:#020617;display:flex;flex-direction:column;align-items:center;padding-top:10px}
.icon{padding:14px;margin:6px 0;border-radius:10px;opacity:.7}
.icon.active,.icon:hover{background:#1e293b;opacity:1}

/* SECRETARIAS */
.sidebar-channels{background:#020617;padding:10px;border-right:1px solid #1e293b;overflow:auto}
.channel{padding:10px;border-radius:8px;cursor:pointer}
.channel:hover{background:#1e293b}
.channel.active{background:#2563eb}

/* MAIN */
.main{display:flex;flex-direction:column}
.chat-header{padding:15px;border-bottom:1px solid #1e293b;font-weight:bold}
.chat-box{flex:1;padding:15px;overflow:auto}

/* MSG */
.msg{max-width:70%;padding:10px;margin-bottom:10px;border-radius:10px;background:#1e293b}
.msg.user{background:#2563eb;margin-left:auto}

/* INPUT */
.input-area{display:flex;padding:10px;border-top:1px solid #1e293b}
input{flex:1;padding:10px;border-radius:8px;border:none;background:#020617;color:white}
button{margin-left:10px;padding:10px;background:#2563eb;border:none;color:white;border-radius:8px}
</style>
</head>

<body>

<div id="login">
  <div class="login-box">
    <h3>Login Institucional</h3>
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<div class="app">

  <div class="sidebar-icons">
    <div class="icon active">🏛️</div>
    <div class="icon">💬</div>
  </div>

  <div class="sidebar-channels" id="lista"></div>

  <div class="main">
    <div class="chat-header" id="titulo">Selecione uma secretaria</div>
    <div class="chat-box" id="chat"></div>

    <div class="input-area">
      <input id="msg" placeholder="Mensagem institucional...">
      <button onclick="enviar()">Enviar</button>
    </div>
  </div>

</div>

<script>

// 🔐 SUA CONFIGURAÇÃO
const SUPABASE_URL = 'https://uqdwtzlkqaosnweyoyit.supabase.co'
const SUPABASE_KEY = 'sb_publishable_uafBQD1aJ3w8_eq4meOsNQ_wzk8TwhA'

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// SECRETARIAS
const secretarias = [
"Saneamento","Finanças","Obras","Saúde","Educação",
"Esportes","Infraestrutura","Marketing","Segurança",
"Lazer e Cultura","RH","Gabinete","Recursos Humanos",
"Ação Social","Compras"
];

let atual = null;
let user = null;

// LISTA
const lista = document.getElementById("lista");

secretarias.forEach(sec=>{
  const div = document.createElement("div");
  div.className="channel";
  div.innerText=sec;
  div.onclick=()=>abrir(sec,div);
  lista.appendChild(div);
});

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password: senha
  });

  if(error){
    alert("Erro no login");
  } else {
    user = data.user;
    document.getElementById("login").style.display="none";

    setTimeout(()=>{
      document.querySelector(".channel").click();
    },200);
  }
}

// ABRIR
function abrir(sec, el){
  atual = sec;

  document.querySelectorAll(".channel").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("titulo").innerText = sec;

  carregar();
}

// ENVIAR
async function enviar(){
  const input = document.getElementById("msg");

  if(!input.value || !atual) return;

  await supabase.from("mensagens").insert({
    secretaria: atual,
    texto: input.value,
    user_id: user.id
  });

  input.value="";
}

// CARREGAR
async function carregar(){
  const { data } = await supabase
    .from("mensagens")
    .select("*")
    .eq("secretaria", atual)
    .order("created_at");

  const chat = document.getElementById("chat");
  chat.innerHTML="";

  data.forEach(m=>{
    chat.innerHTML += `
      <div class="msg ${m.user_id === user.id ? 'user':''}">
        ${m.texto}
      </div>
    `;
  });
}

// TEMPO REAL
supabase
.channel('chat')
.on('postgres_changes',
  { event:'*', schema:'public', table:'mensagens' },
  ()=>carregar()
)
.subscribe();

</script>

</body>
</html>
