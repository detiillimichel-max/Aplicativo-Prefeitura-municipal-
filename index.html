<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunicação Interna - Prefeitura</title>
  
  <!-- Importando o Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef1f5;
    }

    header {
      background: #0d47a1;
      color: white;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 { margin: 0; font-size: 24px; }
    header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.8; }

    .container {
      display: flex;
      height: calc(100vh - 80px);
    }

    /* Sidebar (Secretarias) */
    aside {
      width: 250px;
      background: #1c1e21;
      color: white;
      overflow-y: auto;
    }

    .secretaria {
      padding: 15px;
      border-bottom: 1px solid #333;
      cursor: pointer;
      transition: background 0.2s;
    }

    .secretaria:hover, .secretaria.ativa {
      background: #1976d2;
      font-weight: bold;
    }

    /* Área do Chat */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }

    #titulo-chat {
      padding: 15px;
      margin: 0;
      background: #f8f9fa;
      border-bottom: 1px solid #ddd;
      color: #333;
    }

    #chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #eef1f5;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      background: white;
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      max-width: 80%;
      align-self: flex-start;
    }

    .msg-autor {
      font-size: 11px;
      color: #1976d2;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .minha-msg {
      background: #dcf8c6;
      align-self: flex-end;
    }

    /* Área de Digitação */
    .input-area {
      display: flex;
      padding: 15px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }

    .input-area button {
      padding: 12px 20px;
      margin-left: 10px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .input-area button:hover {
      background: #0d47a1;
    }
  </style>
</head>
<body>

<header>
  <h1>🏛️ Comunicação Interna</h1>
  <p>Prefeitura Municipal | Logado como: <strong id="nome-usuario"></strong></p>
</header>

<div class="container">
  <!-- LISTA DE SECRETARIAS -->
  <aside id="lista-secretarias"></aside>

  <!-- CHAT -->
  <main>
    <h2 id="titulo-chat">Selecione um departamento ao lado</h2>
    <div id="chat">
        <p style="text-align:center; color:#888; margin-top: 20px;">Bem-vindo ao sistema de comunicação da Prefeitura.</p>
    </div>

    <div class="input-area" id="area-digitar" style="display: none;">
      <input type="text" id="mensagem" placeholder="Digite sua mensagem para a secretaria...">
      <button onclick="enviarMensagem()">Enviar</button>
    </div>
  </main>
</div>

<script>
  // ==========================================
  // 1. CONFIGURAÇÃO DO BANCO DE DADOS
  // ==========================================
  const SUPABASE_URL = 'COLOQUE_AQUI_SUA_URL_DO_SUPABASE';
  const SUPABASE_KEY = 'COLOQUE_AQUI_SUA_CHAVE_ANON_DO_SUPABASE';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ==========================================
  // 2. IDENTIFICAÇÃO DO FUNCIONÁRIO
  // ==========================================
  let meuNome = localStorage.getItem('prefeitura_nome_usuario');
  if (!meuNome) {
      meuNome = prompt("Qual o seu nome e cargo? (Ex: João - RH)");
      if (!meuNome) meuNome = "Funcionário Anônimo";
      localStorage.setItem('prefeitura_nome_usuario', meuNome);
  }
  document.getElementById('nome-usuario').innerText = meuNome;

  // ==========================================
  // 3. VARIÁVEIS DO SISTEMA
  // ==========================================
  const secretarias = [
    "Saneamento", "Finanças", "Obras", "Saúde", "Educação", 
    "Esportes", "Infraestrutura", "Marketing", "Segurança", 
    "Lazer e Cultura", "Gabinete", "RH / Ação Social"
  ];
  let secretariaAtual = null;
  let inscricaoTempoReal = null; // Para atualizar mensagens na hora

  // ==========================================
  // 4. RENDERIZAR MENU LATERAL
  // ==========================================
  const lista = document.getElementById("lista-secretarias");
  secretarias.forEach(sec => {
    const div = document.createElement("div");
    div.className = "secretaria";
    div.innerText = sec;
    div.onclick = () => abrirChat(sec, div);
    lista.appendChild(div);
  });

  // ==========================================
  // 5. ABRIR CHAT DE UMA SECRETARIA
  // ==========================================
  async function abrirChat(nomeSecretaria, elementoClicado) {
    secretariaAtual = nomeSecretaria;
    document.getElementById("titulo-chat").innerText = "Secretaria de " + nomeSecretaria;
    document.getElementById("area-digitar").style.display = "flex";

    // Destaca a secretaria no menu
    document.querySelectorAll('.secretaria').forEach(el => el.classList.remove('ativa'));
    if (elementoClicado) elementoClicado.classList.add('ativa');

    carregarHistorico();
    configurarTempoReal();
  }

  // ==========================================
  // 6. BUSCAR MENSAGENS NO BANCO
  // ==========================================
  async function carregarHistorico() {
    const chat = document.getElementById("chat");
    chat.innerHTML = "<p style='text-align:center;'>Carregando mensagens...</p>";

    // Busca no Supabase as mensagens onde o destino é a secretaria atual
    const { data, error } = await supabase
      .from('messages')
      .select('*')
      .eq('receiver_id', secretariaAtual) 
      .order('created_at', { ascending: true });

    if (error) {
        console.error("Erro:", error);
        chat.innerHTML = "<p style='color:red;'>Erro ao carregar banco de dados.</p>";
        return;
    }

    chat.innerHTML = "";
    if (data.length === 0) {
        chat.innerHTML = "<p style='text-align:center; color:#888;'>Nenhuma mensagem enviada para este departamento ainda.</p>";
    } else {
        data.forEach(msg => desenharMensagemNaTela(msg));
    }
  }

  // ==========================================
  // 7. ENVIAR MENSAGEM
  // ==========================================
  async function enviarMensagem() {
    const input = document.getElementById("mensagem");
    const texto = input.value.trim();

    if (!texto || !secretariaAtual) return;

    input.value = ""; // Limpa o campo rápido para o usuário

    // Salva no Supabase
    const { error } = await supabase
      .from('messages')
      .insert([{ 
          sender_id: meuNome, // O nome de quem enviou
          receiver_id: secretariaAtual, // A sala da secretaria
          content: texto 
      }]);

    if (error) alert("Falha ao enviar: " + error.message);
  }

  // ==========================================
  // 8. OUVIR NOVAS MENSAGENS (TEMPO REAL)
  // ==========================================
  function configurarTempoReal() {
    if (inscricaoTempoReal) supabase.removeChannel(inscricaoTempoReal);

    inscricaoTempoReal = supabase
      .channel('chat_prefeitura')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
          const novaMsg = payload.new;
          // Se a mensagem for pra aba que estou olhando agora, mostra na tela
          if (novaMsg.receiver_id === secretariaAtual) {
              // Remove aviso de "Nenhuma mensagem" se existir
              if(document.querySelector('#chat p')) document.querySelector('#chat p').remove();
              desenharMensagemNaTela(novaMsg);
          }
      }).subscribe();
  }

  // ==========================================
  // 9. FUNÇÃO AUXILIAR: DESENHAR MENSAGEM
  // ==========================================
  function desenharMensagemNaTela(msg) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    
    // Verifica se a mensagem foi enviada por mim
    const ehMinha = msg.sender_id === meuNome;
    div.className = "msg " + (ehMinha ? "minha-msg" : "");

    div.innerHTML = `
      <div class="msg-autor">${msg.sender_id}</div>
      <div>${msg.content}</div>
    `;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight; // Rola pro final automaticamente
  }

  // Permitir envio com a tecla "Enter"
  document.getElementById("mensagem").addEventListener("keypress", function(event) {
    if (event.key === "Enter") enviarMensagem();
  });
</script>
</body>
</html>
